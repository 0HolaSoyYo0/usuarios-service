# ===============================
# CONFIGURACIÓN DE DATA SOURCE (PostgreSQL)
# ===============================
# URL de conexión: reemplaza 'localhost:5432' y 'nombre_tu_db' según corresponda
spring.datasource.url=jdbc:postgresql://192.168.1.10:5432/usuarios_db
spring.datasource.username=admin
spring.datasource.password=Clave.De.Admin-000
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ===============================
# Define cómo se comportará la base de datos al iniciar (update, create, create-drop, none, validate)
spring.jpa.hibernate.ddl-auto=update

# Muestra las consultas SQL en la consola para depuración
spring.jpa.show-sql=true

# Formatea el SQL en la consola para que sea legible
spring.jpa.properties.hibernate.format_sql=true

# Dialecto específico (aunque Spring Boot suele detectarlo automáticamente)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# CONFIGURACIÓN ADICIONAL (Opcional)
# ===============================
# Puerto de la aplicación (por defecto es 8080)
server.port=8080

# Nombre de la aplicación para logs
spring.application.name=usuarios-service